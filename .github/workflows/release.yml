name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name en_decoder b64_tool.py
        
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/en_decoder.exe
        name: Release ${{ github.ref_name }}
        body: |
          ## Base64 & RSA Tool ${{ github.ref_name }}
          
          A clean, minimal desktop GUI application for Base64 encoding/decoding and RSA encryption/decryption.
          
          ### Features:
          - Clean dark-mode interface using CustomTkinter
          - Base64 encoding/decoding with large input/output text fields
          - RSA encryption/decryption with 2048-bit key generation
          - Two-tab interface for Base64 and RSA operations
          - Scrollable RSA tab for better UX
          - One-click encode/decode and encrypt/decrypt functionality
          - Copy to clipboard feature
          - Error handling for invalid inputs
          
          ### Download:
          - **Windows**: `en_decoder.exe` (single executable, no installation required)
          
          ### Usage:
          1. Download `en_decoder.exe` from assets below
          2. Run the executable
          3. **Base64 Tab**: Enter text, click "Encode" or "Decode"
          4. **RSA Tab**: Generate keys, enter text, click "Encrypt" or "Decrypt"
          5. Copy results using "Copy to Clipboard"
          
          ### Building from source:
          ```bash
          # Install dependencies
          pip install -r requirements.txt
          # Build executable
          pyinstaller --onefile --windowed --name en_decoder b64_tool.py
          ```
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
